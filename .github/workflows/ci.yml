name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Both platforms: a package-lock.json regenerated over an existing
      # node_modules tree records only that machine's native binaries, so a
      # lock made on macOS breaks Linux installs and vice versa. Each runner
      # catches the lock the other's platform produced. Tests run on ubuntu.
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Root uses plain npm install for now: @animalabs/chronicle declares
      # platform-package optionalDependencies that were never published to
      # the registry (the binaries ship inside the main tarball instead), so
      # npm ci's lock sync check can never pass here until a chronicle
      # release fixes its manifest. The ui/ install (inside build:ci) is
      # strict npm ci.
      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build:ci
